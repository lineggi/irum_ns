backend:
  name: github
  repo: lineggi/irum_ns
  branch: main
  # GitHub OAuth 인증용 백엔드 주소 (sveltia-cms-auth Cloudflare 워커)
  base_url: https://sveltia-cms-auth.soon218208.workers.dev

# 이미지 저장/인식 위치. /images 전체를 대상으로 해야 기존 사진(guide·cases 등)
# 미리보기가 어드민에서 정상 표시됩니다. 새 업로드도 이 폴더에 저장됩니다.
media_folder: public/images
public_folder: /images

# 한국어 UI
locale: ko

collections:
  - name: cases
    label: 시공사례
    label_singular: 시공사례
    description: 시공 현장 사진과 설명을 추가·수정·삭제합니다.
    folder: src/content/cases
    create: true
    delete: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: 'case-{{year}}{{month}}{{day}}-{{hour}}{{minute}}{{second}}'
    summary: '{{fields.order}}. {{fields.title}} — {{fields.note}}'
    sortable_fields: [order, title]
    fields:
      - { name: image, label: 현장 사진, widget: image, hint: '권장: 가로형 4:3, 가로 1200px 이상, JPG, 1MB 이하' }
      - { name: title, label: 제목, widget: string, default: 논슬립 시공 현장 }
      - { name: note, label: 설명, widget: string, default: 계단·경사로 미끄럼 방지 시공 }
      - { name: order, label: '정렬 순서 (작을수록 먼저)', widget: number, default: 100, value_type: int }

  - name: products
    label: 제품
    label_singular: 제품
    description: 제품 사진·규격·설명을 추가·수정·삭제합니다.
    folder: src/content/products
    create: true
    delete: true
    extension: md
    format: frontmatter
    identifier_field: name
    slug: 'product-{{year}}{{month}}{{day}}-{{hour}}{{minute}}{{second}}'
    summary: '{{fields.order}}. [{{fields.category}}] {{fields.name}}'
    sortable_fields: [order, category, name]
    # Sveltia CMS는 실제 사이트와 동일한 커스텀 프리뷰(registerPreviewTemplate)를 아직 지원하지 않음.
    # 기본 프리뷰는 실제 화면과 달라 혼란을 주므로 끄고, 저장 후 실제 사이트에서 확인.
    editor:
      preview: false
    fields:
      - { name: category, label: 분류, widget: select, options: [논슬립, 마감재, 굽도리, 기타], default: 논슬립 }
      - { name: name, label: 제품명, widget: string }
      - { name: desc, label: 한 줄 설명, widget: string, required: false }
      - name: image
        label: 제품 사진
        widget: image
        hint: '권장: 정사각형~4:3 비율, 가로 1000px 이상, JPG, 1MB 이하. 밝고 깔끔한 배경 추천.'
      - name: badges
        label: 태그 (선택)
        widget: list
        required: false
        field: { name: text, label: 태그, widget: string }
        hint: '초록색 알약 형태로 표시됩니다. 예) 재료분리대, 타일 마감재'
      - name: feats
        label: 특징 목록 (선택)
        widget: list
        required: false
        field: { name: text, label: 특징, widget: string }
        hint: 'Add 버튼으로 한 줄씩 추가하세요. 각 항목 앞에 ✓가 자동으로 붙습니다. (✓는 직접 입력하지 마세요)'
      - name: specs
        label: 규격표
        widget: list
        required: false
        summary: '{{fields.label}}: {{fields.value}}'
        hint: '기존 제품과 동일하게 규격·재질 순서로 채워주세요. 필요하면 행을 추가/삭제할 수 있습니다.'
        default:
          - { label: 규격, value: '' }
          - { label: 재질, value: '' }
        fields:
          - { name: label, label: 항목, widget: string }
          - { name: value, label: 내용, widget: string }
      - name: presetColors
        label: 색상 - 기존 색상에서 선택
        widget: select
        multiple: true
        required: false
        hint: '기존 제품에서 쓰던 색을 골라 담으세요. 여러 개 선택 가능.'
        options:
          - { label: 밝은 베이지, value: '#d7d2c7' }
          - { label: 그레이, value: '#9aa0a6' }
          - { label: 다크그레이, value: '#2b2b2b' }
          - { label: 옐로우, value: '#f4c400' }
          - { label: 그린, value: '#2e7d32' }
          - { label: 브라운, value: '#6d3b2a' }
          - { label: 딥그린, value: '#1f5e3a' }
          - { label: 네이비, value: '#23305e' }
          - { label: 블랙, value: '#222222' }
          - { label: 골드옐로우, value: '#e0b400' }
          - { label: 레드, value: '#9e2b25' }
          - { label: 다크브라운, value: '#5b3b2e' }
          - { label: 실버그레이, value: '#8a8f98' }
      - name: colors
        label: 색상 - 직접 색 추가 (RGB)
        widget: list
        required: false
        field: { name: color, label: 색상, widget: color, enableAlpha: false, allowInput: true }
        hint: '팔레트에 없는 색은 여기서 Add → 색상 상자를 눌러 RGB/HEX로 직접 추가하세요.'
      - { name: note, label: 안내 문구 (선택), widget: text, required: false }
      - { name: order, label: '정렬 순서 (작을수록 먼저)', widget: number, default: 100, value_type: int }

  - name: media
    label: 페이지 이미지
    description: 각 페이지의 대표 이미지를 교체합니다.
    files:
      - name: page_images
        label: 페이지 대표 이미지
        file: src/data/media.json
        fields:
          - { name: home_hero, label: 홈 - 히어로 이미지, widget: image, hint: '권장: 가로형 3:2, 가로 1600px 이상, JPG, 1.5MB 이하 (첫 화면 큰 사진)' }
          - { name: about_image, label: 회사소개 - 이미지, widget: image, hint: '권장: 가로형 4:3, 가로 1200px 이상, JPG, 1MB 이하' }
          - { name: guide_stair, label: 시공가이드 - 계단 논슬립 이미지, widget: image, hint: '권장: 가로형 4:3, 가로 1200px 이상, JPG, 1MB 이하' }
          - { name: guide_finish, label: 시공가이드 - 마감재 이미지, widget: image, hint: '권장: 가로형 4:3, 가로 1200px 이상, JPG, 1MB 이하' }
